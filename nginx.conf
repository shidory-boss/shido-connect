# ═══════════════════════════════════════════════════════════════
# NGINX — VPS ShidoOS
# Copier dans /etc/nginx/sites-available/shidoos
# Puis : ln -s /etc/nginx/sites-available/shidoos /etc/nginx/sites-enabled/
# Certbot : certbot --nginx -d oriacare.shidoos.ci -d api.shidoos.ci
# ═══════════════════════════════════════════════════════════════

# ── oriacare.shidoos.ci — Oria Care PWA (Next.js port 3007) ────
server {
    listen 80;
    server_name oriacare.shidoos.ci;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name oriacare.shidoos.ci;

    ssl_certificate     /etc/letsencrypt/live/oriacare.shidoos.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oriacare.shidoos.ci/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Next.js HMR / WebSocket
    location /_next/webpack-hmr {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── api.shidoos.ci — ShidoMedical Backend (FastAPI port 8001) ──
server {
    listen 80;
    server_name api.shidoos.ci;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.shidoos.ci;

    ssl_certificate     /etc/letsencrypt/live/api.shidoos.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shidoos.ci/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 200M;

    # WebSocket (Whisper STT, queue temps réel)
    location /api/v1/queue/ws {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
